services:
  - type: web
    name: buyernodus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: FRONTEND_URL
        value: https://buyernodus.com
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://api.buyernodus.com/experts/calendar/oauth/callback
      - key: GOOGLE_CALENDAR_TIMEZONE
        value: America/Lima
      - key: APP_TIMEZONE
        value: America/Lima
      - key: CORS_ORIGINS
        value: https://buyernodus.com,https://www.buyernodus.com
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: supplyconnect
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
